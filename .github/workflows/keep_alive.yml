name: Keep Render App Awake

on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows you to manually trigger it

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Application
        run: curl -sSf https://ipl-predictor-iiz9.onrender.com/ > /dev/null || echo "Ping failed but continuing"
